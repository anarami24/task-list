<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tasks List</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="styles.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg bg-dark navbar-dark border-bottom">
<div class="container">
<a class="navbar-brand fw-bold" href="#">Tasks List</a>
</div>
</nav>

<main class="container py-4">
<div class="row mb-3">
  <h2 class="fw-bold">My Tasks List </h2>
</div>
<div class="row">
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addTaskModal">
 + Add Task
</button>
</div>
<div class="row g-3" id="tasksContainer"></div>
</main>

<div class="modal fade" id="addTaskModal" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content">
<form id="taskForm">
<div class="modal-header">
<h5 class="modal-title">Add Task</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<input class="form-control mb-3" id="task" placeholder="Task" required>
<textarea class="form-control mb-3" id="description" rows="3" placeholder="Description" required></textarea>
<input class="form-control mb-3" id="dueDate"  type="date" placeholder="Due Date" required>
</div>
<div class="modal-footer">
<button class="btn btn-primary" type="submit">Save</button>
</div>
</form>
</div>
</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
